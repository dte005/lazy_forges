<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LazyForge</title>
    <style>
      body {
        margin: 0;
        background: #111217;
        color: #e8eaf0;
        font-family: Arial, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .box {
        border: 1px solid #2a3142;
        border-radius: 12px;
        padding: 24px;
        width: min(680px, 92vw);
        background: #171922;
      }
      h1 {
        margin: 0 0 10px;
      }
      .lazy {
        color: #45d5ff;
      }
      .forge {
        color: #f3be38;
      }
    </style>
  </head>
  <body>
    <main class="box">
      <h1><span class="lazy">Lazy</span><span class="forge">Forge</span></h1>
      <p>Página inicial do projeto.</p>
      <p>Em breve: documentação completa, fluxos e guias de uso.</p>
    </main>
  </body>
</html>
